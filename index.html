<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'%3E✍🏻%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Todo list app with Supabase sync" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Todo List</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>
          <span class="heading-main">todo</span>
          <span class="heading-caption">or not todo</span>
        </h1>
        <div id="account-area" class="account-area" aria-live="polite"></div>
      </header>
      <div class="app-main">
        <form id="todo-form">
          <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" />
          <button type="submit" class="btn btn--lg btn--primary">Add</button>
        </form>
        <p id="error-message" class="error-message" aria-live="polite"></p>
        <div id="todo-filters" class="todo-filters" aria-label="Filter todos">
          <div class="todo-filters-chips">
            <button type="button" class="chip chip--active" data-filter="all">All</button>
            <button type="button" class="chip" data-filter="todo">To do</button>
            <button type="button" class="chip" data-filter="done">Done</button>
          </div>
          <div class="todo-search" data-state="collapsed">
            <button type="button" class="todo-search-toggle" aria-label="Search todos">
              <svg class="todo-search-svg" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="5.5" fill="none" stroke="currentColor" stroke-width="1" />
                <line x1="15" y1="15" x2="19" y2="19" stroke="currentColor" stroke-width="1" stroke-linecap="round" />
              </svg>
            </button>
            <div class="todo-search-field">
              <span class="todo-search-icon" aria-hidden="true">
                <svg class="todo-search-svg" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="5.5" fill="none" stroke="currentColor" stroke-width="1" />
                  <line x1="15" y1="15" x2="19" y2="19" stroke="currentColor" stroke-width="1" stroke-linecap="round" />
                </svg>
              </span>
              <input
                type="search"
                id="todo-search-input"
                class="todo-search-input"
                placeholder="Search"
                autocomplete="off"
              />
              <button type="button" class="todo-search-clear" aria-label="Clear search">
                <svg class="todo-search-clear-icon" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
                  <line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1" stroke-linecap="round" />
                  <line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>
        </div>
        <ul id="todo-list"></ul>
        <div id="app-error-block" class="app-error-block" hidden></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
